name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: dog-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: dog-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: dog-windows-x86_64

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Pandoc (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y pandoc

    - name: Install Pandoc (macOS)
      if: runner.os == 'macOS'
      run: brew install pandoc

    - name: Build Binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build Man Page
      if: runner.os != 'Windows'
      run: |
        mkdir -p target/man
        pandoc --standalone -f markdown -t man man/dog.1.md > target/man/dog.1

    - name: Package (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        mkdir -p release/bin release/man
        cp target/${{ matrix.target }}/release/dog release/bin/
        cp target/man/dog.1 release/man/
        cp -r completions release/
        cd release
        tar -czf ../${{ matrix.asset_name }}.tar.gz *

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p release/bin
        cp target/${{ matrix.target }}/release/dog.exe release/bin/
        cp -r completions release/
        cd release
        7z a ../${{ matrix.asset_name }}.zip *

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ matrix.asset_name }}.tar.gz
          ${{ matrix.asset_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
