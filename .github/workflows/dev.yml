name: CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["master", "dev"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Lint
        run: cargo clippy --verbose --target ${{ matrix.target }} -- -D warnings

      - name: Run tests
        run: cargo test --verbose --target ${{ matrix.target }}

  test-fedora:
    name: Build and Test (Fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: dnf install -y git gcc openssl-devel pkgconf-pkg-config perl

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build --verbose

      - name: Lint
        run: cargo clippy --verbose -- -D warnings

      - name: Run tests
        run: cargo test --verbose
